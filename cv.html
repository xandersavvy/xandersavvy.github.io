<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Souvik Ghosh — CV</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Light — Rustic Day */
      --bg:        #f5f0e8;
      --surface:   #fdfaf4;
      --border:    #d4c9ba;
      --text:      #2c2420;
      --muted:     #7a6655;
      --accent:    #8b5e3c;
      --tag-bg:    #e8ddd0;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --radius:    10px;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] {
      /* Dark — Rustic Night */
      --bg:      #1e1a16;
      --surface: #2a2320;
      --border:  #4a3d35;
      --text:    #ede0cc;
      --muted:   #a89080;
      --accent:  #c8845a;
      --tag-bg:  #3d3028;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Toolbar ── */
    #cv-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    [data-theme="dark"] #cv-toolbar { background: rgba(30,26,22,0.92); }
    #cv-toolbar .logo { font-weight: 700; font-size: 0.88rem; margin-right: auto; color: var(--muted); }
    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      border: 1px solid var(--border);
      transition: background var(--transition), opacity var(--transition);
      text-decoration: none;
    }
    .tb-btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .tb-btn-primary:hover { opacity: 0.82; }
    .tb-btn-secondary { background: var(--surface); color: var(--text); }
    .tb-btn-secondary:hover { background: var(--tag-bg); }
    .tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    #btn-theme-cv {
      width: 34px; height: 34px;
      display: grid; place-items: center;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background var(--transition);
    }
    #btn-theme-cv:hover { background: var(--tag-bg); }
    #btn-theme-cv svg { width: 15px; height: 15px; }

    /* ── CV Body ── */
    #cv-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }
    #cv-loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Rendered markdown styles ── */
    #cv-content h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.2rem; }
    #cv-content > p:first-of-type { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.2rem; }
    #cv-content h2 {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3rem; margin: 2rem 0 0.75rem;
    }
    #cv-content h3 { font-size: 0.95rem; font-weight: 700; margin: 1rem 0 0.25rem; }
    #cv-content p { margin: 0.35rem 0; color: var(--muted); font-size: 0.88rem; line-height: 1.7; }
    #cv-content strong { color: var(--text); font-weight: 600; }
    #cv-content a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
    #cv-content ul { padding-left: 1.25rem; margin: 0.4rem 0 0.8rem; }
    #cv-content li { list-style: disc; margin: 0.3rem 0; font-size: 0.87rem; color: var(--muted); line-height: 1.65; }
    #cv-content li strong { color: var(--text); }
    #cv-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    #cv-content code { font-family: var(--mono); font-size: 0.82em; background: var(--tag-bg); padding: 0.1em 0.35em; border-radius: 4px; }

    @media print {
      #cv-toolbar { display: none; }
      #cv-body { padding: 1rem; max-width: 100%; }
      body { background: #fff; color: #000; }
    }
    @media (max-width: 600px) {
      #cv-body { padding: 2rem 1rem 4rem; }
      #cv-content h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="cv-toolbar">
    <span class="logo">Souvik Ghosh — CV</span>
    <a href="index.html" class="tb-btn tb-btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <button id="btn-print-cv" class="tb-btn tb-btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PDF
    </button>
    <button id="btn-theme-cv" aria-label="Toggle theme">
      <svg id="cv-theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>

  <div id="cv-body">
    <div id="cv-loading">Loading CV…</div>
    <div id="cv-content" hidden></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script>
    (function () {
      const THEME_KEY = 'sg-theme';
      const root = document.documentElement;

      // Sync theme with portfolio
      function getTheme() { return localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        localStorage.setItem(THEME_KEY, t);
        const icon = document.getElementById('cv-theme-icon');
        if (!icon) return;
        icon.innerHTML = t === 'dark'
          ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
          : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      }
      applyTheme(getTheme());
      document.getElementById('btn-theme-cv').addEventListener('click', function () {
        applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      // Load & render markdown
      fetch('./resume.md')
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function (md) {
          document.getElementById('cv-loading').hidden = true;
          const content = document.getElementById('cv-content');
          content.innerHTML = marked.parse(md);
          content.hidden = false;
        })
        .catch(function (err) {
          document.getElementById('cv-loading').textContent = 'Failed to load CV: ' + err.message;
        });

      // Download PDF via print dialog
      document.getElementById('btn-print-cv').addEventListener('click', function () {
        window.print();
      });
    }());
  </script>
</body>
</html>
